<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>NexusWorks.Guardian.UI</title>
    <base href="/" />
    <link rel="stylesheet" href="css/tailwind.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="NexusWorks.Guardian.UI.styles.css" />
    <link rel="stylesheet" href="vendor/material-symbols/material-symbols-outlined.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="flex min-h-[60vh] w-full items-center justify-center px-6">
            <div class="w-full max-w-sm">
                <div class="mb-3 text-center text-sm font-medium text-slate-600">
                    Loading Guardian...
                </div>
                <div class="h-2 w-full overflow-hidden rounded-full bg-slate-200">
                    <div class="h-full w-1/3 rounded-full bg-blue-500 app-loading-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/guardian-hotkey-map.js"></script>
    <script src="js/guardian-hotkeys.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
