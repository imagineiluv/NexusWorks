<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MauiApp1</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/tailwind.css" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="MauiApp1.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="vendor/material-symbols/material-symbols-outlined.css" />

    <!-- Vendored xterm assets (avoid CDN dependency in MAUI WebView) -->
    <link rel="stylesheet" href="vendor/xterm/xterm.css" />
    <script src="vendor/xterm/xterm.js"></script>
    <script src="vendor/xterm/xterm-addon-fit.js"></script>

    <script src="js/terminal.js"></script>

    <style>
        @keyframes appLoadingBar {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(250%);
            }
        }

        .app-loading-bar {
            animation: appLoadingBar 1.2s ease-in-out infinite;
            will-change: transform;
        }
    </style>

    <script>
        window.isNearBottom = function (element, thresholdPx) {
            try {
                const el = element instanceof HTMLElement
                    ? element
                    : (element && element.id ? document.getElementById(element.id) : null);
                if (!el) return true;

                const threshold = typeof thresholdPx === 'number' ? thresholdPx : 24;
                const distanceFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
                return distanceFromBottom <= threshold;
            } catch {
                return true;
            }
        };

        window.scrollToBottom = function (element, onlyIfNearBottom, thresholdPx) {
            try {
                const el = element instanceof HTMLElement
                    ? element
                    : (element && element.id ? document.getElementById(element.id) : null);
                if (!el) return;

                if (onlyIfNearBottom && !window.isNearBottom(el, thresholdPx)) return;

                requestAnimationFrame(() => {
                    el.scrollTop = el.scrollHeight;
                });
            } catch (err) {
                console.error('scrollToBottom failed', err);
            }
        };
    </script>

</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="flex min-h-[60vh] w-full items-center justify-center px-6">
            <div class="w-full max-w-sm">
                <div class="mb-3 text-center text-sm font-medium text-gray-700">
                    Loading…
                </div>
                <div class="h-2 w-full overflow-hidden rounded-full bg-gray-700">
                    <div class="app-loading-bar h-full w-1/3 rounded-full bg-gray-300"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
